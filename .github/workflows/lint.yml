name: RTL Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verilator-lint:
    name: Verilator SystemVerilog Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y verilator

      - name: Show Verilator version
        run: verilator --version

      - name: Lint ALU
        run: |
          verilator --lint-only --sv --Wall \
            rtl/alu.sv

      - name: Lint Register File
        run: |
          verilator --lint-only --sv --Wall \
            rtl/register_file.sv

      - name: Lint Immediate Extend
        run: |
          verilator --lint-only --sv --Wall \
            rtl/imm_extend.sv

      - name: Lint Control Unit
        run: |
          verilator --lint-only --sv --Wall \
            rtl/control_unit.sv

      - name: Lint Hazard Detection
        run: |
          verilator --lint-only --sv --Wall \
            rtl/hazard/hazard_detection.sv

      - name: Lint Forwarding Unit
        run: |
          verilator --lint-only --sv --Wall \
            rtl/hazard/forwarding_unit.sv

      - name: Lint Pipeline Stages
        run: |
          verilator --lint-only --sv --Wall \
            rtl/pipeline/if_stage.sv
          verilator --lint-only --sv --Wall \
            rtl/pipeline/id_stage.sv
          verilator --lint-only --sv --Wall \
            rtl/pipeline/ex_stage.sv
          verilator --lint-only --sv --Wall \
            rtl/pipeline/mem_stage.sv
          verilator --lint-only --sv --Wall \
            rtl/pipeline/wb_stage.sv

      - name: Lint Top-Level Core
        run: |
          verilator --lint-only --sv --Wall \
            rtl/alu.sv \
            rtl/register_file.sv \
            rtl/imm_extend.sv \
            rtl/control_unit.sv \
            rtl/hazard/hazard_detection.sv \
            rtl/hazard/forwarding_unit.sv \
            rtl/pipeline/if_stage.sv \
            rtl/pipeline/id_stage.sv \
            rtl/pipeline/ex_stage.sv \
            rtl/pipeline/mem_stage.sv \
            rtl/pipeline/wb_stage.sv \
            rtl/riscv_core.sv